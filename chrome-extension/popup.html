<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 400px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; 
      color: #e0e0e0; 
      padding: 20px;
    }
    h1 { 
      font-size: 16px; 
      color: #fff; 
      margin-bottom: 4px;
      display: flex; 
      align-items: center; 
      gap: 8px; 
    }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
    .status { 
      padding: 12px; 
      border-radius: 8px; 
      margin-bottom: 12px; 
      font-size: 13px;
      line-height: 1.5;
    }
    .status.info { background: #16213e; border: 1px solid #0f3460; }
    .status.success { background: #0a3d0a; border: 1px solid #1b5e20; }
    .status.error { background: #3d0a0a; border: 1px solid #5e1b1b; }
    .status.loading { background: #16213e; border: 1px solid #0f3460; }
    .info-row { 
      display: flex; 
      justify-content: space-between; 
      padding: 6px 0; 
      border-bottom: 1px solid #2a2a4a; 
      font-size: 13px; 
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    .info-value { color: #fff; font-weight: 500; }
    .models { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 4px; 
      margin-top: 8px; 
    }
    .model-tag { 
      background: #16213e; 
      border: 1px solid #0f3460; 
      padding: 2px 8px; 
      border-radius: 4px; 
      font-size: 11px; 
      color: #7ec8e3; 
    }
    button { 
      width: 100%; 
      padding: 10px; 
      border: none; 
      border-radius: 8px; 
      font-size: 14px; 
      font-weight: 600; 
      cursor: pointer; 
      margin-top: 8px; 
      transition: opacity 0.2s; 
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2eaadc; color: #fff; }
    .btn-copy { background: #333; color: #fff; }
    .btn-copy.copied { background: #1b5e20; }
    textarea { 
      width: 100%; 
      height: 120px; 
      background: #111; 
      color: #7ec8e3; 
      border: 1px solid #333; 
      border-radius: 8px; 
      padding: 10px; 
      font-family: 'Cascadia Code', 'Fira Code', monospace; 
      font-size: 11px; 
      resize: vertical; 
      margin-top: 8px; 
    }
    .hidden { display: none; }
    .spinner { 
      display: inline-block; 
      width: 14px; height: 14px; 
      border: 2px solid #555; 
      border-top-color: #2eaadc; 
      border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
      margin-right: 6px; 
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>🔑 Notion AI Config</h1>
  <div class="subtitle">一键提取账号配置，用于 Notion AI Proxy</div>

  <div id="status" class="status info">
    点击下方按钮，在 Notion 页面上提取账号配置。
  </div>

  <button id="extractBtn" class="btn-primary">⚡ 提取配置</button>

  <div id="result" class="hidden">
    <div id="infoRows"></div>
    <div id="modelTags" class="models"></div>
    <textarea id="configJson" readonly></textarea>
    <button id="copyBtn" class="btn-copy">📋 复制 JSON 配置</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
