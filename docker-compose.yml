version: '3.8'

services:
  notion-manager:
    build: .
    image: notion-manager:latest
    container_name: notion-manager
    ports:
      - "8081:8081"
    volumes:
      - ./accounts:/app/accounts
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
    environment:
      - NOTION_PORT=8081
      # - ADMIN_PASSWORD=your_secure_password
      # - NOTION_PROXY=http://host.docker.internal:7890 # Use host.docker.internal in Docker, not 127.0.0.1
